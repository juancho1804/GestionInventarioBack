spring.application.name=gatewayservice
server.port=${PORT:8080}

# JWT
jwt.secret=${JWT_SECRET}

# USERSERVICE
spring.cloud.gateway.server.webflux.routes[0].id=userservice
spring.cloud.gateway.server.webflux.routes[0].uri=${USER_SERVICE_URL}
spring.cloud.gateway.server.webflux.routes[0].predicates[0]=Path=/auth/**

# PRODUCTSERVICE - GET públicos
spring.cloud.gateway.server.webflux.routes[1].id=productservice-public
spring.cloud.gateway.server.webflux.routes[1].uri=${PRODUCT_SERVICE_URL}
spring.cloud.gateway.server.webflux.routes[1].predicates[0]=Path=/products/**,/categories/**,/brands/**,/sizes/**,/colors/**
spring.cloud.gateway.server.webflux.routes[1].predicates[1]=Method=GET

# PRODUCTSERVICE - protegidos
spring.cloud.gateway.server.webflux.routes[2].id=productservice-protected
spring.cloud.gateway.server.webflux.routes[2].uri=${PRODUCT_SERVICE_URL}
spring.cloud.gateway.server.webflux.routes[2].predicates[0]=Path=/products/**
spring.cloud.gateway.server.webflux.routes[2].predicates[1]=Method=POST,PUT,DELETE
spring.cloud.gateway.server.webflux.routes[2].filters[0]=JwtAuthFilter

# UPLOADS
spring.cloud.gateway.server.webflux.routes[3].id=productservice-uploads
spring.cloud.gateway.server.webflux.routes[3].uri=${PRODUCT_SERVICE_URL}
spring.cloud.gateway.server.webflux.routes[3].predicates[0]=Path=/uploads/**